<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a8d5f">
<meta name="description" content="وقت الصلاة — أوقات الصلاة في المغرب">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>وقت الصلاة — WaqtSalat</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<style>
:root{
  --bg:#fafafa;--fg:#1a1a1a;--accent:#1a8d5f;--accent2:#15724d;
  --surface:#fff;--surface2:#f0f0f0;--border:#e0e0e0;
  --muted:#666;--passed:#999;
  --arc-fajr:#1a237e;--arc-sunrise:#fdd835;--arc-dhuhr:#f9a825;
  --arc-asr:#ef6c00;--arc-maghrib:#7b1fa2;--arc-isha:#0d1b2a;
  --safe-b:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root:not([data-theme="light"]){
    --bg:#0a0a0a;--fg:#f0f0f0;--accent:#2ecc71;--accent2:#27ae60;
    --surface:#1a1a1a;--surface2:#252525;--border:#333;
    --muted:#999;--passed:#555;
  }
}
[data-theme="dark"]{
  --bg:#0a0a0a;--fg:#f0f0f0;--accent:#2ecc71;--accent2:#27ae60;
  --surface:#1a1a1a;--surface2:#252525;--border:#333;
  --muted:#999;--passed:#555;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--fg);
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
}
[lang="ar"] body{line-height:1.8}
[lang="fr"] body,[lang="en"] body{line-height:1.5}
a{color:var(--accent);text-decoration:none}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit;touch-action:manipulation}
.skip-link{
  position:absolute;top:-100%;left:0;background:var(--accent);color:#fff;
  padding:0.5rem 1rem;z-index:1000;border-radius:0 0 0.25rem 0;
}
.skip-link:focus{top:0}
.app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
main{
  flex:1;overflow-y:auto;padding:1rem;
  padding-bottom:calc(4.5rem + var(--safe-b));
  max-width:600px;width:100%;margin:0 auto;
}
.view{display:none}.view.active{display:block}
nav.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;justify-content:space-around;align-items:center;
  padding-bottom:var(--safe-b);height:calc(3.5rem + var(--safe-b));z-index:100;
}
nav.bottom-bar button{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:0.15rem;padding:0.5rem 0;min-height:2.75rem;min-width:2.75rem;
  color:var(--muted);transition:color 0.2s;font-size:0.65rem;
}
nav.bottom-bar button.active{color:var(--accent)}
nav.bottom-bar button svg{width:1.5rem;height:1.5rem}
nav.bottom-bar button:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;border-radius:0.25rem}
.header-info{text-align:center;margin-bottom:1rem}
.header-info .city-name{font-size:1.1rem;font-weight:600}
.header-info .date-line{font-size:0.85rem;color:var(--muted);margin-top:0.25rem}
.clock-container{display:flex;justify-content:center;margin:1rem 0}
.clock-svg{width:min(280px,80vw);height:min(280px,80vw)}
.next-prayer-box{
  text-align:center;padding:1rem;margin:1rem 0;
  background:var(--surface);border-radius:0.75rem;border:1px solid var(--border);
}
.next-prayer-label{font-size:0.85rem;color:var(--muted)}
.next-prayer-name{font-size:1.5rem;font-weight:700;color:var(--accent);margin:0.25rem 0}
.countdown{font-size:1.8rem;font-weight:700;font-variant-numeric:tabular-nums}
.prayer-list{
  list-style:none;background:var(--surface);
  border-radius:0.75rem;border:1px solid var(--border);overflow:hidden;
}
.prayer-list li{
  display:flex;justify-content:space-between;align-items:center;
  padding:0.85rem 1rem;border-bottom:1px solid var(--border);transition:background 0.2s;
}
.prayer-list li:last-child{border-bottom:none}
.prayer-list li.passed{color:var(--passed)}
.prayer-list li.current{background:var(--accent);color:#fff;font-weight:600;border-radius:0.25rem}
.prayer-list li .prayer-name{font-size:0.95rem}
.prayer-list li .prayer-time{font-size:0.95rem;font-variant-numeric:tabular-nums}
.qibla-container{text-align:center;padding:1rem 0}
.compass-svg{width:min(280px,80vw);height:min(280px,80vw)}
.qibla-info{margin-top:1rem}
.qibla-info .angle{font-size:1.3rem;font-weight:600;color:var(--accent)}
.qibla-info .distance{font-size:0.9rem;color:var(--muted);margin-top:0.25rem}
.btn-compass{
  margin-top:1rem;padding:0.75rem 1.5rem;background:var(--accent);color:#fff;
  border-radius:0.5rem;font-weight:600;font-size:0.9rem;
}
.settings-section{
  background:var(--surface);border-radius:0.75rem;
  border:1px solid var(--border);margin-bottom:1rem;overflow:hidden;
}
.settings-section h3{
  padding:0.75rem 1rem;font-size:0.9rem;font-weight:600;
  background:var(--surface2);border-bottom:1px solid var(--border);
}
.setting-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:0.75rem 1rem;border-bottom:1px solid var(--border);gap:0.5rem;
}
.setting-row:last-child{border-bottom:none}
.setting-row label{font-size:0.9rem;flex:1}
.setting-row select,.setting-row input[type="range"]{
  font-size:0.85rem;padding:0.35rem;background:var(--surface2);color:var(--fg);
  border:1px solid var(--border);border-radius:0.35rem;
}
.setting-row select{min-width:8rem}
.setting-row input[type="range"]{width:5rem}
.adj-val{font-size:0.8rem;min-width:2.5rem;text-align:center;font-variant-numeric:tabular-nums}
.btn-action{
  display:block;width:100%;padding:0.75rem;text-align:center;
  font-size:0.9rem;font-weight:600;border-bottom:1px solid var(--border);
  transition:background 0.15s;
}
.btn-action:last-child{border-bottom:none}
.btn-action:hover,.btn-action:focus-visible{background:var(--surface2)}
.btn-danger{color:#e74c3c}
.toggle{position:relative;width:2.75rem;height:1.5rem;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle span{
  position:absolute;inset:0;cursor:pointer;background:var(--border);
  border-radius:1rem;transition:background 0.3s;
}
.toggle span::before{
  content:'';position:absolute;width:1.1rem;height:1.1rem;
  left:0.2rem;bottom:0.2rem;background:#fff;border-radius:50%;transition:transform 0.3s;
}
.toggle input:checked+span{background:var(--accent)}
.toggle input:checked+span::before{transform:translateX(1.25rem)}
.toggle input:focus-visible+span{outline:2px solid var(--accent);outline-offset:2px}
.onboarding{
  position:fixed;inset:0;background:var(--bg);z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem;text-align:center;
}
.onboarding.hidden{display:none}
.onboarding h2{font-size:1.5rem;margin-bottom:1.5rem;color:var(--accent)}
.onboarding .step{display:none;width:100%;max-width:320px;flex-direction:column;align-items:center;gap:1rem}
.onboarding .step.active{display:flex}
.lang-choices{display:flex;flex-direction:column;gap:0.75rem;width:100%}
.lang-choices button{
  padding:1rem;background:var(--surface);border:2px solid var(--border);
  border-radius:0.75rem;font-size:1.1rem;font-weight:600;transition:border-color 0.2s;
}
.lang-choices button:hover,.lang-choices button:focus-visible,.lang-choices button.selected{border-color:var(--accent)}
.city-select{
  width:100%;padding:0.75rem;font-size:1rem;background:var(--surface);color:var(--fg);
  border:1px solid var(--border);border-radius:0.5rem;
}
.btn-primary{
  padding:0.75rem 2rem;background:var(--accent);color:#fff;
  border-radius:0.5rem;font-weight:600;font-size:1rem;min-width:8rem;
}
.btn-secondary{padding:0.5rem 1.5rem;color:var(--muted);font-size:0.9rem}
.update-banner{
  position:fixed;top:0;left:0;right:0;background:var(--accent);color:#fff;
  display:none;align-items:center;justify-content:center;gap:0.75rem;padding:0.75rem;
  z-index:150;font-size:0.9rem;
}
.update-banner.show{display:flex}
.update-banner button{padding:0.35rem 0.75rem;border-radius:0.25rem;font-weight:600;font-size:0.8rem}
.update-banner .btn-update{background:#fff;color:var(--accent)}
.update-banner .btn-later{color:rgba(255,255,255,0.8)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:0.01ms!important;animation-duration:0.01ms!important}}
@media(prefers-contrast:more){:root{--border:#888;--muted:#444}.prayer-list li.current{outline:2px solid #fff}}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:0.15rem}
</style>
</head>
<body>
<a class="skip-link" href="#main-content" id="skip-link">Skip to content</a>
<div class="update-banner" id="update-banner" role="alert">
  <span id="update-text"></span>
  <button class="btn-update" id="btn-update-now"></button>
  <button class="btn-later" id="btn-update-later"></button>
</div>
<div class="onboarding" id="onboarding">
  <div class="step active" id="step-lang" data-step="0">
    <h2 id="ob-lang-title">اختر اللغة</h2>
    <div class="lang-choices">
      <button data-lang="ar" class="selected">العربية</button>
      <button data-lang="fr">Fran&#231;ais</button>
      <button data-lang="en">English</button>
    </div>
    <button class="btn-primary" id="ob-lang-next">التالي</button>
  </div>
  <div class="step" id="step-city" data-step="1">
    <h2 id="ob-city-title">اختر مدينتك</h2>
    <select class="city-select" id="ob-city-select" aria-label="City"></select>
    <button class="btn-primary" id="ob-gps-btn"><span id="ob-gps-text">تحديد الموقع</span></button>
    <button class="btn-primary" id="ob-city-next">التالي</button>
  </div>
  <div class="step" id="step-done" data-step="2">
    <h2 id="ob-done-title">تم الإعداد</h2>
    <svg width="64" height="64" viewBox="0 0 64 64" role="img" aria-hidden="true"><circle cx="32" cy="32" r="30" fill="none" stroke="var(--accent)" stroke-width="3"/><path d="M18 32l10 10 18-20" fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <button class="btn-primary" id="ob-done-btn">تم</button>
  </div>
</div>
<div class="app" id="app">
<main id="main-content" tabindex="-1">
<section class="view active" id="view-prayers" role="region" aria-label="Prayer Times">
  <div class="header-info">
    <div class="city-name" id="city-name"></div>
    <div class="date-line" id="date-line"></div>
  </div>
  <div class="clock-container">
    <svg class="clock-svg" viewBox="0 0 200 200" role="img" id="analog-clock" aria-label="Prayer times clock">
      <defs><clipPath id="clock-clip"><circle cx="100" cy="100" r="90"/></clipPath></defs>
      <circle cx="100" cy="100" r="95" fill="none" stroke="var(--border)" stroke-width="1"/>
      <g id="clock-arcs" clip-path="url(#clock-clip)"></g>
      <g id="clock-markers"></g>
      <line id="hand-hour" x1="100" y1="100" x2="100" y2="50" stroke="var(--fg)" stroke-width="3" stroke-linecap="round"/>
      <line id="hand-minute" x1="100" y1="100" x2="100" y2="35" stroke="var(--fg)" stroke-width="2" stroke-linecap="round"/>
      <circle cx="100" cy="100" r="3" fill="var(--accent)"/>
    </svg>
  </div>
  <div class="next-prayer-box" role="timer" aria-live="polite" id="next-prayer-box">
    <div class="next-prayer-label" id="next-prayer-label"></div>
    <div class="next-prayer-name" id="next-prayer-name"></div>
    <div class="countdown" id="countdown"></div>
  </div>
  <ul class="prayer-list" role="list" id="prayer-list"></ul>
</section>
<section class="view" id="view-qibla" role="region" aria-label="Qibla">
  <div class="qibla-container">
    <svg class="compass-svg" viewBox="0 0 200 200" role="img" id="compass-svg" aria-label="Qibla compass">
      <circle cx="100" cy="100" r="95" fill="none" stroke="var(--border)" stroke-width="1"/>
      <g id="compass-ticks"></g>
      <text id="lbl-n" x="100" y="18" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="700">N</text>
      <text id="lbl-s" x="100" y="192" text-anchor="middle" fill="var(--fg)" font-size="11">S</text>
      <text id="lbl-e" x="188" y="104" text-anchor="middle" fill="var(--fg)" font-size="11">E</text>
      <text id="lbl-w" x="12" y="104" text-anchor="middle" fill="var(--fg)" font-size="11">W</text>
      <g id="compass-rotate">
        <polygon points="100,15 96,100 104,100" fill="#e74c3c" opacity="0.7"/>
        <polygon points="100,185 96,100 104,100" fill="var(--muted)" opacity="0.3"/>
      </g>
      <g id="qibla-needle">
        <line x1="100" y1="100" x2="100" y2="22" stroke="var(--accent)" stroke-width="3" stroke-linecap="round"/>
        <polygon points="100,18 95,30 105,30" fill="var(--accent)"/>
      </g>
      <circle cx="100" cy="100" r="4" fill="var(--accent)"/>
    </svg>
    <div class="qibla-info">
      <div class="angle" id="qibla-angle"></div>
      <div class="distance" id="qibla-distance"></div>
    </div>
    <button class="btn-compass" id="btn-compass"></button>
  </div>
</section>
<section class="view" id="view-settings" role="region" aria-label="Settings">
  <div class="settings-section">
    <h3 id="s-city-title"></h3>
    <div class="setting-row">
      <label for="s-city-select" id="s-city-label"></label>
      <select id="s-city-select"></select>
    </div>
  </div>
  <div class="settings-section">
    <h3 id="s-lang-title"></h3>
    <div class="setting-row">
      <label for="s-lang-select" id="s-lang-label"></label>
      <select id="s-lang-select">
        <option value="ar">العربية</option>
        <option value="fr">Fran&#231;ais</option>
        <option value="en">English</option>
      </select>
    </div>
  </div>
  <div class="settings-section">
    <h3 id="s-theme-title"></h3>
    <div class="setting-row">
      <label for="s-theme-select" id="s-theme-label"></label>
      <select id="s-theme-select">
        <option value="system" id="opt-theme-system"></option>
        <option value="light" id="opt-theme-light"></option>
        <option value="dark" id="opt-theme-dark"></option>
      </select>
    </div>
  </div>
  <div class="settings-section" id="s-notif-section">
    <h3 id="s-notif-title"></h3>
    <div class="setting-row">
      <label id="s-notif-label"></label>
      <label class="toggle"><input type="checkbox" id="s-notif-toggle"><span></span></label>
    </div>
  </div>
  <div class="settings-section">
    <h3 id="s-adj-title"></h3>
    <div id="s-adj-rows"></div>
  </div>
  <div class="settings-section">
    <button class="btn-action" id="btn-export"></button>
    <button class="btn-action" id="btn-import"></button>
    <button class="btn-action btn-danger" id="btn-reset"></button>
  </div>
  <input type="file" id="import-file" accept=".json" style="display:none">
</section>
</main>
<nav class="bottom-bar" role="navigation" aria-label="Main">
  <button id="nav-prayers" class="active" aria-current="page">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41"/></svg>
    <span id="nav-prayers-text"></span>
  </button>
  <button id="nav-qibla">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polygon points="12,2 15,10 12,8 9,10" fill="currentColor"/></svg>
    <span id="nav-qibla-text"></span>
  </button>
  <button id="nav-settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    <span id="nav-settings-text"></span>
  </button>
</nav>
</div>

ln.setAttribute('x1',100+Math.cos(an)*r1);ln.setAttribute('y1',100+Math.sin(an)*r1);
ln.setAttribute('x2',100+Math.cos(an)*90);ln.setAttribute('y2',100+Math.sin(an)*90);
ln.setAttribute('stroke','var(--muted)');ln.setAttribute('stroke-width',i%90===0?'2':'1');tk.appendChild(ln)}}
function startCompass(){
if(!window.DeviceOrientationEvent)return;
var fn=function(e){var hd=null;if(e.webkitCompassHeading!==undefined)hd=e.webkitCompassHeading;
else if(e.alpha!==null)hd=(360-e.alpha)%360;
if(hd!==null){$('compass-rotate').setAttribute('transform','rotate('+-hd+',100,100)');
var q=calcQ(S.position.lat,S.position.lng);
$('qibla-needle').setAttribute('transform','rotate('+(q-hd)+',100,100)')}};
if(typeof DeviceOrientationEvent.requestPermission==='function'){
DeviceOrientationEvent.requestPermission().then(function(r){if(r==='granted')window.addEventListener('deviceorientation',fn,true)})}
else window.addEventListener('deviceorientation',fn,true)}
function renderSettings(){
$('s-city-title').textContent=t('city');$('s-city-label').textContent=t('selectCity');
popCity($('s-city-select'));if(S.position)$('s-city-select').value=S.position.cityId||'';
$('s-lang-title').textContent=t('language');$('s-lang-label').textContent=t('language');$('s-lang-select').value=S.locale;
$('s-theme-title').textContent=t('theme');$('s-theme-label').textContent=t('theme');
$('opt-theme-system').textContent=t('themeSystem');$('opt-theme-light').textContent=t('themeLight');
$('opt-theme-dark').textContent=t('themeDark');$('s-theme-select').value=S.theme;
$('s-notif-title').textContent=t('notifications');$('s-notif-label').textContent=t('enableNotifications');
$('s-notif-toggle').checked=S.notifications.enabled;
$('s-adj-title').textContent=t('adjustments');
var ar=$('s-adj-rows');ar.innerHTML='';
['fajr','dhuhr','asr','maghrib','isha'].forEach(function(k){
var row=document.createElement('div');row.className='setting-row';
var lb=document.createElement('label');lb.textContent=t(k);lb.setAttribute('for','adj-'+k);
var vl=document.createElement('span');vl.className='adj-val';vl.id='adj-val-'+k;
vl.textContent=(S.adjustments[k]>=0?'+':'')+S.adjustments[k];
var inp=document.createElement('input');inp.type='range';inp.id='adj-'+k;inp.min='-15';inp.max='15';inp.step='1';inp.value=S.adjustments[k];
inp.setAttribute('aria-label',t(k)+' '+t('adjustments'));
inp.addEventListener('input',function(){var v=parseInt(inp.value,10);S.adjustments[k]=v;vl.textContent=(v>=0?'+':'')+v;saveS('waqt-adjustments',S.adjustments);renderPrayers()});
row.appendChild(lb);row.appendChild(vl);row.appendChild(inp);ar.appendChild(row)});
$('btn-export').textContent=t('exportConfig');$('btn-import').textContent=t('importConfig');$('btn-reset').textContent=t('resetConfig')}
function popCity(sel){sel.innerHTML='';CITIES.forEach(function(c){var o=document.createElement('option');o.value=c.id;o.textContent=S.locale==='ar'?c.ar:c.fr;sel.appendChild(o)})}
function setupEvents(){
$('nav-prayers').addEventListener('click',function(){switchView('prayers')});
$('nav-qibla').addEventListener('click',function(){switchView('qibla')});
$('nav-settings').addEventListener('click',function(){switchView('settings')});
$('s-city-select').addEventListener('change',function(e){var c=CITIES.find(function(x){return x.id===e.target.value});if(c){S.position={lat:c.lat,lng:c.lng,cityId:c.id,cityName:c.fr};saveS('waqt-position',S.position);renderPrayers();renderQibla();renderSettings()}});
$('s-lang-select').addEventListener('change',function(e){S.locale=e.target.value;saveS('waqt-locale',S.locale);renderAll()});
$('s-theme-select').addEventListener('change',function(e){S.theme=e.target.value;saveS('waqt-theme',S.theme);applyTheme()});
$('s-notif-toggle').addEventListener('change',function(e){S.notifications.enabled=e.target.checked;saveS('waqt-notifications',S.notifications);if(e.target.checked)reqNotif()});
$('btn-compass').addEventListener('click',startCompass);
$('btn-export').addEventListener('click',function(){var d={};for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k.startsWith('waqt-'))d[k]=localStorage.getItem(k)}var b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='waqtsalat-config-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href)});
$('btn-import').addEventListener('click',function(){$('import-file').click()});
$('import-file').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);for(var k in d)if(k.startsWith('waqt-'))localStorage.setItem(k,d[k]);loadS();renderAll()}catch(err){}};r.readAsText(f);e.target.value=''});
$('btn-reset').addEventListener('click',function(){if(!confirm(t('resetConfirm')))return;var ks=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k.startsWith('waqt-'))ks.push(k)}ks.forEach(function(k){localStorage.removeItem(k)});location.reload()});
document.addEventListener('visibilitychange',function(){if(!document.hidden&&S.position)renderPrayers()});
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',function(){if(S.theme==='system')applyTheme()})}
function setupOB(){
if(S.onboarded&&S.position){$('onboarding').classList.add('hidden');return}
var ob=$('onboarding');popCity($('ob-city-select'));
ob.querySelectorAll('.lang-choices button').forEach(function(btn){btn.addEventListener('click',function(){
ob.querySelectorAll('.lang-choices button').forEach(function(b){b.classList.remove('selected')});
btn.classList.add('selected');S.locale=btn.dataset.lang;saveS('waqt-locale',S.locale);applyLocale();
$('ob-lang-title').textContent=t('onboardingLang');$('ob-lang-next').textContent=t('next');
$('ob-city-title').textContent=t('onboardingCity');$('ob-gps-text').textContent=t('gpsLocate');
$('ob-city-next').textContent=t('next');$('ob-done-title').textContent=t('onboardingDone');
$('ob-done-btn').textContent=t('done');popCity($('ob-city-select'))})});
function showStep(n){ob.querySelectorAll('.step').forEach(function(s){s.classList.remove('active')});ob.querySelector('[data-step="'+n+'"]').classList.add('active')}
$('ob-lang-next').addEventListener('click',function(){showStep(1)});
$('ob-gps-btn').addEventListener('click',function(){if(!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(function(pos){var la=pos.coords.latitude,lo=pos.coords.longitude,nr=CITIES[0],md=Infinity;CITIES.forEach(function(c){var d=Math.hypot(c.lat-la,c.lng-lo);if(d<md){md=d;nr=c}});$('ob-city-select').value=nr.id},function(){},{enableHighAccuracy:true,timeout:10000})});
$('ob-city-next').addEventListener('click',function(){var cid=$('ob-city-select').value,c=CITIES.find(function(x){return x.id===cid});if(c){S.position={lat:c.lat,lng:c.lng,cityId:c.id,cityName:c.fr};saveS('waqt-position',S.position)}showStep(2)});
$('ob-done-btn').addEventListener('click',function(){S.onboarded=true;saveS('waqt-onboarded','true');ob.classList.add('hidden');renderAll()})}
function reqNotif(){if(!('Notification' in window))return;if(Notification.permission==='granted')return schedNotif();if(Notification.permission!=='denied')Notification.requestPermission().then(function(p){if(p==='granted')schedNotif()})}
var nT=[];
function schedNotif(){nT.forEach(clearTimeout);nT=[];if(!S.notifications.enabled||!S.position||!PT)return;var now=nowCasa(),ms=now.getTime();['fajr','dhuhr','asr','maghrib','isha'].forEach(function(k){if(!PT[k])return;var p=PT[k].split(':'),tg=new Date(now);tg.setHours(parseInt(p[0]),parseInt(p[1]),0,0);var df=tg.getTime()-ms;if(df>0&&df<86400000){nT.push(setTimeout(function(){if(Notification.permission==='granted')new Notification(t(k),{body:t('prayerTimes')+' \u2014 '+PT[k],icon:'icons/icon.svg'})},df))}})}
function regSW(){if(!('serviceWorker' in navigator))return;navigator.serviceWorker.register('sw.js').then(function(reg){reg.addEventListener('updatefound',function(){var nw=reg.installing;nw.addEventListener('statechange',function(){if(nw.state==='installed'&&navigator.serviceWorker.controller)showUB(reg)})});if(reg.waiting&&navigator.serviceWorker.controller)showUB(reg)});navigator.serviceWorker.addEventListener('controllerchange',function(){location.reload()})}
function showUB(reg){var b=$('update-banner');$('update-text').textContent=t('updateAvailable');$('btn-update-now').textContent=t('updateNow');$('btn-update-later').textContent=t('later');b.classList.add('show');$('btn-update-now').onclick=function(){reg.waiting.postMessage({type:'SKIP_WAITING'});b.classList.remove('show')};$('btn-update-later').onclick=function(){b.classList.remove('show')}}
function $(id){return document.getElementById(id)}
loadS();
if(!localStorage.getItem('waqt-locale')){var lg=navigator.language;if(lg){lg=lg.slice(0,2);if(TR[lg])S.locale=lg}}
applyLocale();applyTheme();setupOB();setupEvents();
if(S.onboarded&&S.position)renderAll();
regSW();
})();
