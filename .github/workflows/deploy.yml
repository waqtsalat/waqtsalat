name: Deploy to GitHub Pages

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Verify page loads
        run: |
          # Serve index.html and check it returns 200 with expected content
          npx -y serve -l 8080 -s . &
          SERVER_PID=$!
          # Wait for server to be ready (up to 15 seconds)
          for i in $(seq 1 15); do
            if curl -s -o /dev/null http://localhost:8080/ 2>/dev/null; then
              echo "Server ready after ${i}s"
              break
            fi
            if [ "$i" = "15" ]; then
              echo "Server failed to start within 15 seconds"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          if [ "$STATUS" != "200" ]; then
            echo "Page load failed with status $STATUS"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi
          # Verify critical page elements exist
          BODY=$(curl -s http://localhost:8080/)
          echo "$BODY" | grep -q 'id="onboarding"' || { echo "Missing onboarding wizard"; kill $SERVER_PID 2>/dev/null || true; exit 1; }
          echo "$BODY" | grep -q 'id="app"' || { echo "Missing app container"; kill $SERVER_PID 2>/dev/null || true; exit 1; }
          echo "$BODY" | grep -q '<script>' || { echo "Missing inline script"; kill $SERVER_PID 2>/dev/null || true; exit 1; }
          echo "Page load verification passed"
          kill $SERVER_PID 2>/dev/null || true

  build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare deployment directory
        run: |
          mkdir _site
          cp index.html sw.js manifest.webmanifest _site/
          cp -r icons src _site/

      - name: Inject VAPID config into index.html
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          sed -i "s|const VAPID_PUBLIC_KEY = '';|const VAPID_PUBLIC_KEY = '${VAPID_PUBLIC_KEY}';|" _site/index.html
          sed -i "s|const GIST_ID = '';|const GIST_ID = '${GIST_ID}';|" _site/index.html
          sed -i "s|const GIST_TOKEN = '';|const GIST_TOKEN = '${GIST_TOKEN}';|" _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
