name: Deploy to GitHub Pages

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Verify page loads
        run: |
          # Serve index.html and check it returns 200 with expected content
          npx -y serve -l 8080 -s . &
          sleep 2
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          if [ "$STATUS" != "200" ]; then
            echo "Page load failed with status $STATUS"
            exit 1
          fi
          # Verify critical page elements exist
          BODY=$(curl -s http://localhost:8080/)
          echo "$BODY" | grep -q 'id="onboarding"' || { echo "Missing onboarding wizard"; exit 1; }
          echo "$BODY" | grep -q 'id="app"' || { echo "Missing app container"; exit 1; }
          echo "$BODY" | grep -q '<script>' || { echo "Missing inline script"; exit 1; }
          echo "Page load verification passed"

  build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare deployment directory
        run: |
          mkdir _site
          cp index.html sw.js manifest.webmanifest _site/
          cp -r icons src _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
